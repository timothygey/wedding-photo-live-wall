<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Timothy &amp; Megumi — Share Your Photos</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/styles.css?v=17" />
</head>
<body class="upload-page">
  <div class="guest-wrap">
    <div class="guest-header">
      <div class="couple">Timothy &amp; Megumi</div>
      <div class="date">8.8.2026</div>
    </div>

    <div class="tab-bar">
      <a class="btn btn-secondary" href="gallery.html">🖼️ Live Gallery</a>
      <a class="btn btn-secondary sparkle-btn" href="blessing.html"><span class="sparkle-text">Share your well-wishes</span></a>
    </div>

    <div class="upload-card">
      <p>Share the moments you've captured today! Photos appear on the big screen and in the gallery for everyone to enjoy.</p>

      <!-- Two explicit choices: Android Chrome routes a plain multi-file input
           straight to the Google Photos picker (no camera option), so the
           camera needs its own input with the `capture` attribute. -->
      <div class="button-group">
        <label class="drop-zone camera-btn" id="cameraBtn" for="cameraInput">
          <div class="cam-badge">📷</div>
          <div class="big-label">Take Photo</div>
        </label>
        <label class="drop-zone gallery-btn" id="galleryBtn" for="fileInput">
          <div class="cam-badge">🖼️</div>
          <div class="big-label">Choose from Library</div>
        </label>
      </div>
      <div class="upload-hint">Up to 50MB each · JPG, PNG, HEIC &amp; more</div>

      <input type="file" id="cameraInput" accept="image/*" capture="environment" />
      <input type="file" id="fileInput" accept="image/*,.heic,.heif" multiple />

      <div class="selected-list" id="selectedList"></div>

      <button class="btn btn-primary btn-block" id="uploadBtn" disabled>Upload Photos</button>

      <div id="toast"></div>
    </div>
  </div>

<script type="module" src="js/upload.js?v=4"></script>
</body>
</html>
